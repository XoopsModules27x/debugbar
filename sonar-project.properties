# SonarCloud configuration — OPT-IN security/SAST + quality analysis for this module.
#
# Enable in three steps:
#   1. Import the repository into SonarCloud (https://sonarcloud.io).
#   2. Set sonar.organization and sonar.projectKey below to match your SonarCloud project.
#   3. Add a SONAR_TOKEN secret in the repo's Actions secrets.
# The .github/workflows/sonar.yml workflow stays inert until SONAR_TOKEN is present.

sonar.organization=xoopsmodules27x
sonar.projectKey=XoopsModules27x_debugbar
sonar.projectName=debugbar

# Analyse authored sources; keep vendored, generated, and installed asset mirrors out.
sonar.sources=.
sonar.exclusions=vendor/**,**/vendor/**,.build/**,**/.build/**,node_modules/**,**/node_modules/**,language/**,**/language/**,templates/**,**/templates/**,templates_c/**,**/templates_c/**,docs/**,**/docs/**,assets/dist/**,assets/vendor/**,assets/admin-diagnostics.css,assets/admin-logs.css,assets/debugbar.css,assets/debugbar.js,assets/widgets.css,assets/widgets.js,rector.php,.php-cs-fixer.dist.php,phpstan-bootstrap.php,stubs/**
sonar.tests=tests
sonar.test.inclusions=tests/**/*Test.php

# xoops_version.php repeats the declarative legacy/module manifest structure by design.
sonar.cpd.exclusions=xoops_version.php

# Coverage (optional): sonar.yml writes a clover report here when tests + a coverage driver exist.
sonar.php.coverage.reportPaths=.build/coverage/clover.xml

sonar.sourceEncoding=UTF-8
